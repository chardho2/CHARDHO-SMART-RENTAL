<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chardho Admin | Stealth Luxury</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --sidebar-width: 300px;
            --primary: #f82b2b;
            --primary-glow: rgba(248, 43, 43, 0.4);
            --cyber-blue: #0ea5e9;
            --glass-bg: rgba(7, 10, 20, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --serif: 'Playfair Display', serif;
            --sans: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #02040a;
            color: var(--text-main);
            font-family: var(--sans);
            margin: 0;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Dynamic Liquid Background */
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('admin_dashboard_bg_1772188904288.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.6) contrast(1.1);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at top right, rgba(248, 43, 43, 0.05), transparent),
                radial-gradient(circle at bottom left, rgba(14, 165, 233, 0.05), transparent);
            z-index: -1;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: rgba(4, 7, 14, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 2.5rem 1.5rem;
            position: fixed;
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 4rem;
            flex: 1;
            position: relative;
        }

        .logo-section {
            margin-bottom: 4rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .logo-text {
            font-family: 'Outfit';
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--text-muted);
            margin: 2.5rem 0 1rem 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 16px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .nav-link i {
            font-size: 18px;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(8px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(248, 43, 43, 0.15), rgba(0, 0, 0, 0));
            color: var(--primary);
            box-shadow: inset 0 0 10px rgba(248, 43, 43, 0.05);
        }

        .header-title {
            font-family: var(--serif);
            font-size: 3.5rem;
            font-weight: 400;
            margin: 0;
            line-height: 1;
            font-style: italic;
        }

        .header-subtitle {
            font-family: var(--sans);
            font-weight: 400;
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            pointer-events: none;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 12px 28px;
            border-radius: 15px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        .btn-luxury {
            background: linear-gradient(135deg, var(--primary), #ef4444);
            border: none;
            box-shadow: 0 10px 25px var(--primary-glow);
        }

        .btn-luxury:hover {
            box-shadow: 0 15px 35px var(--primary-glow);
            transform: translateY(-3px);
        }

        .mixed-text {
            font-family: var(--serif);
            font-style: italic;
            color: var(--primary);
            font-weight: 400;
        }

        .search-bar {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            padding: 14px 22px;
            border-radius: 20px;
            width: 350px;
            color: #fff;
            outline: none;
            font-family: var(--sans);
        }

        .search-bar:focus {
            border-color: var(--cyber-blue);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        }
    </style>
</head>

<body>
    <div class="bg-fixed"></div>
    <div class="bg-overlay"></div>

    <div class="sidebar">
        <div class="logo-section">
            <div class="logo-icon"><i data-lucide="zap" style="color: #fff; fill: #fff;"></i></div>
            <div class="logo-text">CHAR<span style="color: var(--primary);">DHO</span></div>
        </div>

        <div class="nav-label">Management</div>
        <a href="#" class="nav-link active"><i data-lucide="compass"></i> Universal Fleet</a>
        <a href="#" class="nav-link"><i data-lucide="users"></i> VIP Clients</a>
        <a href="#" class="nav-link"><i data-lucide="file-check"></i> Agreements</a>

        <div class="nav-label">Reports</div>
        <a href="#" class="nav-link"><i data-lucide="bar-chart-3"></i> Revenue Streams</a>
        <a href="#" class="nav-link"><i data-lucide="activity"></i> System Logs</a>

        <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
            <a href="#" class="nav-link"><i data-lucide="settings"></i> Configurations</a>
        </div>
    </div>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5rem;">
            <div>
                <h1 class="header-title">The <span class="mixed-text">Stealth</span> Portal</h1>
                <p class="header-subtitle">PREMIUM ADMINISTRATION CONSOLE // VERSION 2.0</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="action-btn"><i data-lucide="plus"></i> New Entity</button>
                <button class="action-btn btn-luxury"><i data-lucide="shield-plus"></i> Secure Agreement</button>
            </div>
        </header>

        <div id="preview-root"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const mockData = [
            { id: "V-9921", name: "Elias Vance", tier: "Platinum", status: "Active", asset: "Audi e-tron GT" },
            { id: "V-8820", name: "Sarah Connor", tier: "Gold", status: "Available", asset: "Tesla Model S" },
            { id: "V-7719", name: "James Bond", tier: "VIP Elite", status: "Reserved", asset: "Aston Martin DB11" }
        ];

        const Dashboard = () => {
            useEffect(() => { lucide.createIcons(); }, []);

            return (
                <div className="glass-card">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '3.5rem' }}>
                        <div>
                            <h2 style={{ fontFamily: 'var(--serif)', fontSize: '2.5rem', fontWeight: 400, margin: 0 }}>
                                Customer <span className="mixed-text">Intelligence</span>
                            </h2>
                            <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem', letterSpacing: '1px' }}>GLOBAL DATABASE SYNC ACTIVE</p>
                        </div>
                        <input type="text" placeholder="QUERY DATABASE..." className="search-bar" />
                    </div>

                    <div className="table-wrapper">
                        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                            <thead>
                                <tr style={{ borderBottom: '1px solid var(--glass-border)', color: 'var(--text-muted)', fontSize: '0.75rem', fontWeight: 800, textTransform: 'uppercase', letterSpacing: '2px' }}>
                                    <th style={{ textAlign: 'left', padding: '15px' }}>Serial</th>
                                    <th style={{ textAlign: 'left' }}>Client Identity</th>
                                    <th style={{ textAlign: 'left' }}>Status</th>
                                    <th style={{ textAlign: 'left' }}>Managed Asset</th>
                                    <th style={{ textAlign: 'right', padding: '15px' }}>Operations</th>
                                </tr>
                            </thead>
                            <tbody>
                                {mockData.map((client, i) => (
                                    <tr key={i} style={{ borderBottom: '1px solid rgba(255,255,255,0.03)', transition: '0.3s' }}>
                                        <td style={{ padding: '25px 15px', fontFamily: 'var(--serif)', fontSize: '1.2rem', color: 'var(--primary)' }}>{client.id}</td>
                                        <td>
                                            <div style={{ fontWeight: 800, fontSize: '1rem' }}>{client.name}</div>
                                            <div style={{ fontSize: '0.75rem', color: 'var(--cyber-blue)', fontWeight: 700 }}>{client.tier}</div>
                                        </td>
                                        <td>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: client.status === 'Active' ? '#22c55e' : '#f59e0b' }}></div>
                                                <span style={{ fontSize: '0.85rem', fontWeight: 700 }}>{client.status}</span>
                                            </div>
                                        </td>
                                        <td>
                                            <div style={{ fontStyle: 'italic', color: '#fff' }}>{client.asset}</div>
                                        </td>
                                        <td style={{ textAlign: 'right', padding: '15px' }}>
                                            <button style={{ background: 'transparent', border: 'none', color: 'var(--text-muted)', cursor: 'pointer' }}><i className="fa fa-ellipsis-h"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('preview-root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
