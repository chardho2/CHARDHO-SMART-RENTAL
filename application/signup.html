<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARDHO | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/assets/css/chardho_main.css">
</head>
<body>
    <section style="min-height: 100vh; display: grid; place-items: center; padding: 2rem;">
        <div class="glass-panel glow-border" style="width: 100%; max-width: 460px;">
            <img src="../public/assets/img/chardho-logo.png" alt="CHARDHO Smart Rental" class="logo-img auth">
            <h2 style="margin-bottom: 1rem;">Sign Up</h2>
            <p style="color: var(--muted); margin-bottom: 1.5rem;">Create your CHARDHO account.</p>
            <form id="signup-form" style="display: grid; gap: 1rem;">
                <input id="name" type="text" placeholder="Full name" required />
                <input id="email" type="email" placeholder="Email" required />
                <input id="phone" type="tel" placeholder="Phone (10-15 digits)" required />
                <input id="password" type="password" placeholder="Password" required />
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Create Account</button>
            </form>
            <p id="signup-msg" style="margin-top: 1rem; color: var(--muted);"></p>
            <p style="margin-top: 1rem; color: var(--muted);">
                Already have an account? <a href="./login.html" style="color: var(--primary);">Login</a>
            </p>
            <p style="margin-top: 0.5rem;"><a href="./index.html" style="color: var(--muted);">Back to home</a></p>
        </div>
    </section>

    <script>
        const API_BASE = 'http://localhost:4000/api';
        const form = document.getElementById('signup-form');
        const msg = document.getElementById('signup-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.textContent = 'Creating account...';

            const payload = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                userType: 'user'
            };

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok || !data.success) {
                    msg.textContent = data.message || 'Signup failed';
                    return;
                }
                msg.textContent = 'Signup successful. Redirecting to login...';
                setTimeout(() => window.location.href = './login.html', 900);
            } catch (err) {
                msg.textContent = 'Unable to reach server. Ensure backend is running on port 4000.';
            }
        });
    </script>
</body>
</html>
